name: Demo Screenshots & PDF

# Disparo SOLO manual para no gastar CI en cada commit.
# GitHub Actions UI → "Run workflow" → selecciona la branch deseada.
on:
  workflow_dispatch:

jobs:
  demo-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # -----------------------------------------------------------------------
    # Servicio Postgres 16 — idéntico al job build-test de ci.yml para
    # garantizar paridad de entorno (mismas credenciales, imagen, opciones).
    # -----------------------------------------------------------------------
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vetlla
          POSTGRES_PASSWORD: vetlla_dev_password
          POSTGRES_DB: vetlla
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vetlla -d vetlla"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Rol OWNER — migraciones y seed
      DATABASE_URL: postgresql://vetlla:vetlla_dev_password@localhost:5432/vetlla?schema=public
      # Rol de APP no propietario — runtime con RLS activo (ADR-0014)
      APP_DATABASE_URL: postgresql://vetlla_app:vetlla_app_ci_password@localhost:5432/vetlla?schema=public
      AUTH_SECRET: ci-secret-not-for-production
      # http explícito: Auth.js infiere cookies NO-Secure (si fueran Secure no
      # viajarían sobre http://localhost y la sesión no persistiría → todo a /login).
      AUTH_URL: http://localhost:3000
      # Email en modo consola (no hay SMTP en CI)
      EMAIL_PROVIDER: console
      # Sin IA real en las capturas (StubProvider)
      AI_PROVIDER: stub
      # URL base que usará el script de capturas
      DEMO_BASE_URL: http://localhost:3000

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - uses: actions/checkout@v4
        with:
          ref: claude/vetlla-saas-mvp-spec-PuHOW

      # -----------------------------------------------------------------------
      # 2. Toolchain — mismas versiones que ci.yml
      # -----------------------------------------------------------------------
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # -----------------------------------------------------------------------
      # 3. Dependencias
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # -----------------------------------------------------------------------
      # 4. Prisma client
      # -----------------------------------------------------------------------
      - name: Generate Prisma client
        run: pnpm db:generate

      # -----------------------------------------------------------------------
      # 5. Bootstrap del rol vetlla_app ANTES de migrate: las migraciones lo
      #    referencian (GRANT/REVOKE) y en BD nueva aún no existe.
      # -----------------------------------------------------------------------
      - name: Bootstrap app role (before migrations reference it)
        env:
          PGHOST: localhost
          PGPORT: '5432'
          PGUSER: vetlla
          PGPASSWORD: vetlla_dev_password
          PGDATABASE: vetlla
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          fi
          psql -v ON_ERROR_STOP=1 -v app_password="vetlla_app_ci_password" \
            -f packages/db/prisma/sql/app-role-bootstrap.sql

      # -----------------------------------------------------------------------
      # 5b. Migraciones (rol OWNER)
      # -----------------------------------------------------------------------
      - name: Apply database migrations
        run: pnpm --filter @vetlla/db migrate:deploy

      # -----------------------------------------------------------------------
      # 6. Rol de app no propietario (ADR-0014) — igual que ci.yml
      # -----------------------------------------------------------------------
      - name: Create non-owner app role for RLS (ADR-0014)
        env:
          PGHOST: localhost
          PGPORT: '5432'
          PGUSER: vetlla
          PGPASSWORD: vetlla_dev_password
          PGDATABASE: vetlla
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          fi
          psql -v ON_ERROR_STOP=1 -v app_password="vetlla_app_ci_password" \
            -f packages/db/prisma/sql/app-role.sql

      # -----------------------------------------------------------------------
      # 7. Seed de demo — crea tenant, residencia, residentes, usuarios demo
      # -----------------------------------------------------------------------
      - name: Seed demo data
        run: pnpm --filter @vetlla/db run seed

      # -----------------------------------------------------------------------
      # 8. Build de producción de Next.js
      # -----------------------------------------------------------------------
      - name: Build Next.js app
        run: pnpm --filter web build

      # -----------------------------------------------------------------------
      # 9. Arrancar la app en background y esperar a que :3000 responda
      # -----------------------------------------------------------------------
      - name: Start Next.js app (background)
        run: pnpm --filter web start &

      - name: Wait for app on :3000
        run: npx --yes wait-on http://localhost:3000 --timeout 120000

      # -----------------------------------------------------------------------
      # 10. Instalar Chromium de Playwright
      #     (NO se usa PW_CHROMIUM: descarga gestionada por Playwright)
      # -----------------------------------------------------------------------
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      # -----------------------------------------------------------------------
      # 11. Capturar screenshots y generar PDF
      # -----------------------------------------------------------------------
      - name: Run demo screenshots script
        run: node scripts/demo-screenshots.mjs

      # Publica el PDF en la rama demo-pdf-latest para poder entregarlo en chat
      # (el almacenamiento de artefactos de GitHub no es accesible desde el sandbox
      # del CIO, pero el remoto git sí). Solo se commitea el PDF, sobre HEAD.
      - name: Publish PDF to delivery branch
        if: success()
        run: |
          git config user.name "vetlla-ci"
          git config user.email "ci@vetlla.local"
          rm -rf _delivery
          mkdir -p _delivery/shots
          cp artifacts/Vetlla-Demo-Real.pdf _delivery/Vetlla-Demo-Real.pdf
          cp artifacts/shots/*.png _delivery/shots/ || true
          git add -f _delivery
          git commit -m "chore(demo): PDF + PNGs de capturas reales [skip ci]"
          git push -f \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            HEAD:demo-pdf-latest

      # -----------------------------------------------------------------------
      # 12. Subir artefactos: PDF + PNGs individuales
      # -----------------------------------------------------------------------
      - name: Upload demo PDF
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Vetlla-Demo-Real-PDF
          path: artifacts/Vetlla-Demo-Real.pdf
          retention-days: 30

      - name: Upload individual screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Vetlla-Demo-Screenshots-PNG
          path: artifacts/shots/
          retention-days: 30
