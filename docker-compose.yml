services:
  postgres:
    image: postgres:16-alpine
    container_name: vetlla-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vetlla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vetlla_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-vetlla}
    ports:
      - "5432:5432"
    volumes:
      - vetlla_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vetlla} -d ${POSTGRES_DB:-vetlla}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vetlla_pgdata:
