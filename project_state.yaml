open_questions:
  - id: Q-001
    date: 2026-06-08
    question: >-
      Rumbo del diferencial de IA: ¿reactivar H5 (decidir modelo UE/coste y
      construir el copiloto) o reposicionar el relato a "cloud + cumplimiento ahora,
      IA en roadmap" mientras tanto? Es la principal tensión del análisis de negocio.
    status: resolved           # 2026-06-09: reactivar H5, estrategia open-source soberano (ADR-0010)
    resolution_2026-06-09: >-
      RESUELTA. Angel confirma reactivar H5 con estrategia open-source soberano
      (docs/adr/0010, enmienda ADR-0008): capa provider-agnóstica liderando LLM
      open-source auto-alojados en la UE; Claude-UE como fallback. Pendiente solo la
      elección de proveedor/modelo concretos (ligada a A-003), que no bloquea el Slice 1.
    update_2026-06-08: >-
      Resuelta la incógnita técnica de "qué modelo UE" (docs/adr/0008): hay vía viable
      (Claude en Bedrock/Vertex UE). Queda la decisión de Angel: (a) reactivar H5 ahora
      construyendo packages/ai sobre esa vía, o (b) mantener diferido y reposicionar el
      relato a "cloud+cumplimiento ahora, IA en roadmap". Y, si (a), elegir vía de hosting
      (ligada a A-003).
    update_2026-06-09: >-
      Angel inclina a (a) reactivar H5 sobre la vía cloud-EU, dejando el proveedor
      cloud (Bedrock vs Vertex / A-003) por decidir; por eso packages/ai se diseñará
      provider-agnóstico. Mientras tanto se ha avanzado en refinamiento UX (Sprint M:
      medicación + RBAC). La construcción de H5 (packages/ai) sigue siendo el próximo
      gran hito pendiente.
    related: [H5, D-003, ADR-0008, ADR-0010]
  - id: Q-002
    date: 2026-06-08
    question: >-
      Validar las dos incógnitas que mueven la economía (informe 03): precio real
      por plaza/mes y adopción/churn real, idealmente con 3-5 centros piloto.
    status: open
    related: [D-003]
  - id: Q-003
    date: 2026-06-10
    question: >-
      Política de retención y supresión de datos (RGPD/DSAR, INC-2). ¿Cuánto tiempo
      se conservan los datos clínicos del residente tras el alta/baja/fallecimiento, y
      qué se anonimiza vs. se borra (respetando obligaciones legales de conservación
      sanitaria en España y la integridad del AuditLog)? Es decisión de negocio/legal,
      no técnica: condiciona el diseño de export/borrado del interesado (art. 15-17).
    status: open
    related: [INC-2, A1, A6]
  - id: Q-004
    date: 2026-06-10
    question: >-
      Aprovisionar OVHcloud (ADR-0011): credenciales de AI Endpoints + Postgres
      gestionado + app, y firma del DPA/SCC con residencia UE. Tiene coste recurrente y
      es contrato con tercero -> decisión de Angel. Desbloquea INC-3 (deploy UE) y INC-4
      (cablear el copiloto real + benchmark es/ca que cierra H5). Verificar ENS para
      clientes del sector público español antes de contratar.
    status: open
    related: [INC-3, INC-4, ADR-0011, A-003, H5]
  - id: Q-005
    date: 2026-06-11
    question: >-
      Provisión del rol de aplicación vetlla_app (NOSUPERUSER NOBYPASSRLS, solo CRUD) en el
      Postgres GESTIONADO de OVHcloud (A-003/Q-004). En CI y local lo crea el script de
      bootstrap (packages/db/prisma/sql/app-role.sql) como owner, pero algunos Postgres
      gestionados NO conceden CREATEROLE al usuario base, o exigen crear roles desde la
      consola del proveedor. Necesito saber, al contratar OVHcloud: (a) si el usuario base
      puede CREATE ROLE / GRANT, o (b) si el rol de app y su contraseña los provisiona
      operaciones/Angel desde la consola. La contraseña del rol va a secretos, nunca al repo.
      Bloquea que el aislamiento RLS se enforce en el entorno UE de producción (invariante #1).
    status: open
    related: [INC-1, INC-3, ADR-0014, ADR-0002, A-003, Q-004]

  # Preguntas nuevas — SuperApp Residente/Familia (2026-06-12, gap analysis)
  - id: Q-006
    date: 2026-06-12
    question: >-
      App nativa vs. PWA con distribución en tiendas: ¿publicamos la PWA actual en
      App Store / Google Play como TWA (Trusted Web Activity — más rápido y barato,
      cobertura de notificaciones push nativas parcial) o construimos app nativa con
      React Native / Expo? Impacta directamente en la adopción del portal familiar
      (APP-001 del documento SuperApp) y en el modelo de push notifications. La PWA
      cubre el MVP operativo; la tienda mejora el descubrimiento y la UX en iOS.
      Decisión de negocio con implicaciones de coste de desarrollo y mantenimiento.
    status: open
    related: [H6, docs/producto/2026-06-12-superapp-residente-familia-gap.md]

  - id: Q-007
    date: 2026-06-12
    question: >-
      Pasarela de pagos para el módulo PAY (Pagos/Recibos): ¿qué proveedor usar
      (Stripe EU, Redsys, BBVA Merchant, otro) y qué modelo comercial (¿Vetlla cobra
      comisión de la transacción, el centro la absorbe, o se repercute al familiar)?
      El bloque de Pagos completo (PAY-001..PAY-011) está completamente bloqueado por
      esta decisión. El modelo de datos (Invoice/Receipt) se puede diseñar ahora;
      la pasarela real requiere contrato + credenciales + cumplimiento PCI-DSS delegado
      al proveedor. Ver docs/producto/2026-06-12-superapp-residente-familia-gap.md.
    status: open
    related: [docs/producto/2026-06-12-superapp-residente-familia-gap.md]

  - id: Q-008
    date: 2026-06-12
    question: >-
      Firma electrónica para el Centro Documental: ¿qué nivel de firma requiere el
      sector (simple/avanzada/cualificada según eIDAS)? ¿Qué proveedor UE? (Autofirma
      del MPTFP, Signaturit, DocuSign UE, ValidatedID). La firma simple (hash +
      confirmación del usuario autenticado) se puede implementar sin proveedor externo
      para documentos informativos; contratos y autorizaciones con validez legal plena
      requieren firma avanzada o cualificada con proveedor homologado. Afecta también
      a si el modelo de datos de Document necesita campo `signatureProvider` y evidencias
      externas de no-repudio. Ver docs/producto/2026-06-12-superapp-residente-familia-gap.md.
    status: open
    related: [docs/producto/2026-06-12-superapp-residente-familia-gap.md, Q-004]

  - id: Q-009
    date: 2026-06-12
    question: >-
      Modelo de multicentro corporativo: cuando un grupo corporativo opera varios
      centros, ¿son tenants separados en Vetlla (aislamiento máximo, gestión
      administrativa independiente, más simple de implementar con el modelo RLS actual)
      o un único tenant con múltiples centros bajo una capa de "grupo" (análisis
      agregado multi-centro, configuración corporativa compartida, más complejo)?
      Esta decisión afecta al schema (¿añadir modelo Group?), al RBAC (¿rol corporativo
      con visibilidad multi-centro?), y a la analítica (BI agregado). El beachhead
      actual (centros pequeños/independientes) no lo necesita, pero los grupos
      residenciales medianos sí. Ver docs/producto/2026-06-12-superapp-residente-familia-gap.md.
    status: open
    related: [docs/producto/2026-06-12-superapp-residente-familia-gap.md, D-003]

  # Preguntas nuevas — Core Asistencial Completo (2026-06-13, gap analysis)
  - id: Q-010
    date: 2026-06-13
    question: >-
      DECISIÓN DE POSICIONAMIENTO ESTRATÉGICO (bloqueante para el roadmap): ¿Vetlla compite
      en paridad funcional TOTAL con ResiPlus (incluyendo facturación a CCAA, copagos por
      autonomía, SISAAD, contabilidad integrada, nóminas propias) o en "core suficiente +
      mejor UX/IA/SuperApp" (bloque asistencial completo + cumplimiento normativo + facturación
      básica a particulares + SEPA, dejando facturación CCAA/contabilidad/nóminas como
      integraciones con software especializado)?
      La vía de paridad total requiere: (a) asesoría normativa continua por CCAA (17 sistemas
      de facturación concertada distintos), (b) homologación Verifactu/AEAT, (c) 3-5 años de
      trabajo sostenido en módulos regulados. La vía "core suficiente" llega al mercado antes,
      cubre el beachhead (centros pequeños/independientes), y puede ampliar a paridad en una
      segunda fase. Esta decisión determina el roadmap de los próximos 18 meses.
    status: open
    related: [docs/producto/2026-06-13-core-asistencial-completo-gap.md, D-003, Q-011, Q-012]

  - id: Q-011
    date: 2026-06-13
    question: >-
      ASESORÍA NORMATIVA EXTERNA: para construir correctamente la facturación a CCAA
      (módulo B2), los copagos (B3) y los ficheros SISAAD (E2) se necesita validación legal
      específica por autonomía: los formatos de factura concertada, los cálculos de
      participación del usuario (IPREM, tabla autonómica) y los ficheros XML del IMSERSO
      varían por decreto y cambian. Un error puede hacer perder al cliente la subvención del
      concierto o generar una liquidación incorrecta a la CCAA.
      ¿Tiene Angel ya un asesor o gestoría especializada en el sector que pueda validar
      los módulos económico-administrativos antes de lanzar? ¿O Vetlla necesita contratar
      esa asesoría? Prioridad ALTA si la respuesta a Q-010 es "paridad total".
    status: open
    related: [docs/producto/2026-06-13-core-asistencial-completo-gap.md, Q-010]

  - id: Q-012
    date: 2026-06-13
    question: >-
      FACTURA ELECTRÓNICA / VERIFACTU (B5): la obligación de Verifactu (AEAT) aplica a todas
      las empresas que emitan facturas en España (calendario por tramos: en vigor para grandes
      empresas, en extensión a pymes). ¿Vetlla construye el módulo de factura electrónica en
      casa (requiere proceso de homologación con la AEAT, no solo código) o se integra con un
      proveedor certificado (Factura+, InvoPilot, Holded, etc.) que asume la homologación?
      Recomendación de Pau: integrar con proveedor certificado para evitar el riesgo de
      homologación directa. Esta decisión desbloquea toda la cadena de facturación (B1-B5)
      y es necesaria antes de cobrar el primer euro de una factura de estancia.
    status: open
    related: [docs/producto/2026-06-13-core-asistencial-completo-gap.md, Q-010, Q-011]

# --------------------------------------------------------------------------
# Hitos
# --------------------------------------------------------------------------
milestones:
  - id: H0
    name: Andamiaje
    status: done               # not_started | in_progress | done
    effort: M
    goal: Monorepo, Next.js, Prisma+Postgres (docker), Auth.js, CI básico, CLAUDE.md, project_state.yaml, login funcional.
    exit_criteria:
      - Monorepo arranca (pnpm install + dev) y lint/typecheck en verde.
      - Postgres local vía docker-compose; primera migración Prisma aplicada.
      - Pantalla de login funcional con Auth.js.
      - CI básico (lint + typecheck + tests) en verde.
    result:
      summary: >-
        Monorepo pnpm+Turborepo con apps/web (Next 15 App Router + tRPC v11 +
        Auth.js v5 + Tailwind) y packages/db (Prisma 6 + Postgres). Login por
        credenciales funcional (verificado en runtime: sesión con role+tenantId,
        rechazo de credenciales inválidas). lint + build + typecheck + 5 tests en
        verde. Migración inicial aplicada y seed con tenant demo + 5 roles.
      verified:
        - "pnpm lint / build / typecheck: verde"
        - "Vitest: 5 tests verde (auth-schema, login-form, UserRole)"
        - "Runtime: /login 200, / -> 307 /login, tRPC health ok, login credenciales -> sesión"
      notes:
        - Docker presente pero el registry está bloqueado por la política de red; en
          este entorno se usó el Postgres 16 del sistema. docker-compose.yml queda
          para entornos con acceso al registry.
        - E2E (Playwright) configurado con smoke test; se integrará en CI con BD de test (post-H0).
      adr: docs/adr/0001-monorepo-stack-andamiaje.md

  - id: H1
    name: Multitenancy + RBAC
    status: done
    effort: L
    goal: Tenants, usuarios, roles, RLS y aislamiento verificado por test.
    exit_criteria:
      - tenant_id + RLS en todas las tablas con datos.
      - Contexto de tenant inyectado en middleware de auth.
      - Test demuestra que un tenant no ve datos de otro por ninguna ruta/query.
      - RBAC por rol + pertenencia a tenant (mínimo privilegio).
    result:
      summary: >-
        RLS en Postgres (ENABLE + FORCE) sobre tenants y users, con políticas por
        GUC app.tenant_id y bypass para superadmin/seed (fallo en cerrado). Cliente
        Prisma forTenant/asPlatformAdmin que fija el contexto por transacción. tRPC
        con tenantProcedure (inyecta ctx.db aislado) y permissionProcedure (RBAC).
        Login adaptado a bypass (lookup cross-tenant por email).
      verified:
        - "DB: 6 tests de aislamiento RLS (lectura/escritura cruzada, fallo en cerrado, bypass)"
        - "RBAC: 5 tests unitarios de la matriz de permisos"
        - "Runtime API: dirección ve solo sus 4 usuarios; auxiliar -> FORBIDDEN en users.list; tenant.current aislado"
        - "lint + build + typecheck verde; 16 tests en total"
      adr: docs/adr/0002-rls-multitenancy.md
      notes:
        - Un solo rol de Postgres con FORCE RLS (app y migraciones comparten rol). En
          producción se valorará un rol de app no propietario (ADR-0002).
        - Cada tabla futura con datos debe añadir tenant_id + RLS+FORCE + política en su migración.

  - id: H2
    name: Centros, plazas y residentes
    status: done
    effort: L
    goal: CRUD de centro/unidad/plaza y expediente sociosanitario básico + escalas.
    exit_criteria:
      - CRUD Center (residencia|centro_dia|vivienda_tutelada), Unit, Bed/Plaza, ocupación.
      - Expediente Resident con contactos, dependencia, alergias, diagnósticos.
      - Assessment con escalas Barthel y Tinetti.
    result:
      summary: >-
        Modelo de datos de centros/unidades/plazas + expediente del residente
        (contactos, alergias, diagnósticos, escalas), todo con tenant_id y RLS+FORCE.
        API tRPC CRUD (centers, units, beds, residents + sub-recursos) con RBAC e
        integridad cross-tenant. Escalas Barthel/Tinetti como dominio tipado con
        validación de rango e interpretación. packages/ui (estilo shadcn) y UI con
        shell autenticado: panel, centros (+detalle con ocupación), residentes
        (+expediente). Seed §13 con 2 centros (30+8 plazas) y 28 residentes.
      verified:
        - "DB: 8 tests (aislamiento RLS incluye centros/residentes)"
        - "Web: 17 tests (rbac, escalas, schemas, login-form)"
        - "Runtime API: centers.list/residents.list, alta de centro (dir) vs FORBIDDEN (auxiliar), validación de rango de escala (BAD_REQUEST)"
        - "lint + build + typecheck verde; 25 tests en total; 9 rutas construidas"
