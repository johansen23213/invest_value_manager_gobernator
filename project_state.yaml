# --------------------------------------------------------------------------
# Ciclos de gobierno del CIO (iteración MVP -> producción)
# --------------------------------------------------------------------------
governance_cycles:
  - id: GC-1
    date: 2026-06-10
    cio: cio-vetlla
    objetivo: >-
      Arrancar la iteración MVP -> producción (MVP H0-H6 completo; H5 a falta de
      re-validar con modelo real). Producir roadmap de brechas y decidir el incremento #1.
    entrega:
      roadmap: docs/roadmap-produccion.md
      gap_areas: [seguridad_rgpd, fiabilidad_ci_deploy_ue, copiloto_ia, datos_migraciones, ux_a11y, observabilidad, multicentro]
    brechas_criticas:
      - "B1 — CI no protege el aislamiento RLS (ni RLS de packages/db ni Playwright E2E en pipeline). Invariante #1 sin red de seguridad."
      - "A1/A3 — RGPD bloqueante para datos reales: sin DSAR (export/borrado) y sin DPIA/DPA no se opera legalmente."
      - "B2 — Sin camino reproducible a producción UE (deploy/IaC/secretos/backups)."
      - "C1/C2 — Diferencial (copiloto) sin validar (benchmark es/ca) ni cablear (OVHcloud); H5 no cierra."
    decision_incremento_1:
      id: INC-1
      titulo: "Blindar el aislamiento RLS en CI"
      owner: quim-qa
      apoyo: leo-devops, nuria-backend
      status: done  # CERRADO: CI run #56 (commit 40fb4f0) completado SUCCESS. Gate dinámico (rls.test.ts, paso #13) VERDE con rol vetlla_app NOSUPERUSER NOBYPASSRLS. 2026-06-11.
      porque: >-
        Protege el principio central (multitenant/RLS) y es VERIFICABLE en este entorno
        porque CI ya levanta Postgres de servicio (no requiere BD local). Es reversible,
        barato, y desbloquea toda épica que toque schema (DSAR, MAR offline) al darles red
        de seguridad de aislamiento. No toca producto: solo añade garantías a la pipeline.
      criterios_aceptacion:
        - "CI ejecuta como paso dedicado la suite de aislamiento RLS de packages/db (falla si hay fuga cross-tenant). [IMPLEMENTADO — paso '[INC-1] RLS isolation gate' en ci.yml]"
        - "CI ejecuta Playwright E2E de flujos críticos contra la BD de servicio. [PENDIENTE — nota/instrucciones añadidas en ci.yml; requiere job dedicado con playwright install]"
        - "Test meta: enumera tablas con tenant_id y falla si alguna no tiene RLS+FORCE+política (garantía estructural, no puntual). [VERDE AQUÍ — 56 tests estáticos, rls-coverage.test.ts]"
        - "pnpm lint && typecheck && build && test verde en pipeline. [VERDE AQUÍ para lint+typecheck; test con BD solo verde en CI de GitHub]"
      entregado_2026-06-11:
        quim_qa: >-
          Inventario completo de la suite packages/db (ver abajo). Bug detectado y corregido
          en rls-coverage.test.ts: el parser de schema.prisma usaba [^}]+ que se cortaba en
          comentarios con } literal (p.ej. el modelo Medication tenía '// array [{ ... }]'),
          resultando en tabla "medication" en vez de "medications". Reemplazado por scanner
          balanceado de llaves línea a línea. Tests estáticos: 56 verde (todos los modelos
          con tenantId verificados). Gate dedicado añadido en ci.yml ANTES del step genérico.
          E2E: instrucciones documentadas en ci.yml para leo-devops; no habilitado (requiere
          playwright install + seed + app en :3000).
        hallazgo_bug_parser: >-
          HALLAZGO REAL: El parser original del test meta (rls-coverage.test.ts) usaba regex
          [^}]+ para capturar el cuerpo de los bloques 'model X { ... }'. El campo 'momentDoses'
          del modelo Medication tiene un comentario inline con '// array [{ "time": "HH:MM",
          "dose": "2 comp" }]' — la '}' en ese comentario terminaba el regex prematuramente,
          haciendo que @@map("medications") quedara fuera del bloque capturado. El fallback
          retornaba modelName.toLowerCase() = "medication", que no coincide con ninguna
          migración RLS, resultando en 3 fallos falsos-negativos (ENABLE+FORCE+política). Corregido
          con scanner de profundidad de llaves que ignora el contenido tras '//'.
      inventario_packages_db:
        tests_estaticos:
          - "rls-coverage.test.ts: test meta sin BD (56 tests). VERDE AQUÍ. Cubre las 18 tablas con tenantId: verifica ENABLE+FORCE+política en migraciones por tabla."
          - "care-merge.test.ts: 5 tests de lógica pura de sync (LWW, idempotencia). VERDE AQUÍ."
          - "enum.test.ts: 1 test de enumeración UserRole. VERDE AQUÍ."
        tests_integracion_pendientes_bd:
          - "rls.test.ts: 7 tests RLS reales (aislamiento lectura/escritura, WITH CHECK, fallo en cerrado, bypass). PENDIENTE-BD — verde solo en CI de GitHub."
          - "audit.integration.test.ts: 3 tests AuditLog (escritura, RLS, inmutabilidad). PENDIENTE-BD."
          - "care-sync.integration.test.ts: 3 tests sync con RLS (idempotencia, LWW, cross-tenant). PENDIENTE-BD."
        nota: >-
          Los tests de integración usan describe.skipIf(!hasDb) pero en el entorno local el
          .env define DATABASE_URL (sin Postgres activo), por lo que los tests no se saltan sino
          que fallan en beforeAll. Comportamiento correcto en CI donde Postgres SÍ está disponible.
      inventario_e2e:
        ficheros:
          - "smoke.spec.ts: login visible"
          - "medicacion-mar.spec.ts: MAR (M-01..M-04, M-07)"
          - "prescripcion.spec.ts: prescripción (M-05..M-08)"
          - "equipo-rbac.spec.ts: equipo/RBAC (R-01..R-04)"
          - "auditoria.spec.ts: trazabilidad (cambio de rol)"
          - "copiloto.spec.ts / copiloto-pia.spec.ts: flujos IA (copiloto, PIA)"
        estado: NO_EN_CI  # requiere playwright install + seed + next start; instrucciones en ci.yml
      entorno_nota: >-
        Escritura de tests/workflow verificada aquí (tipos/lint/tests estáticos VERDE).
        Ejecución verde con Postgres (integración) la confirma la pipeline de GitHub
        (PENDIENTE-BD, resuelto por CI). No firmo como "cerrado" hasta que el gate
        dinámico esté verde en la pipeline real.
    hallazgo_rls_bypass:
      fecha: 2026-06-11
      run: "GitHub CI run #53, commit f4f7905"
      titulo: "RLS se bypasseaba: la app conectaba como rol SUPERUSUARIO (Postgres ignora RLS para superusers)"
      detectado_por: quim-qa (QA) + leo-devops (DevOps), tras arreglar el build del CI
      sintoma: >-
        Por PRIMERA VEZ se ejecutó rls.test.ts contra el Postgres real (antes el build
        siempre estuvo rojo y los tests de integración nunca corrieron en CI). FALLARON:
        (1) "sin contexto de tenant no se ve ninguna fila (falla en cerrado)" esperaba 0,
        obtuvo 3 (rls.test.ts:81); (2) "centros y residentes aislados por RLS"
        dbB.center.findMany() esperaba 0, obtuvo 1 (rls.test.ts:103).
      causa_raiz_confirmada: >-
        CONFIRMADA por el CIO leyendo el código. PostgreSQL IGNORA RLS para usuarios
        SUPERUSER, incluso con ENABLE+FORCE (FORCE somete al PROPIETARIO de la tabla, NO al
        superusuario — son dos exenciones distintas). El servicio postgres:16-alpine del CI
        crea POSTGRES_USER=vetlla como SUPERUSUARIO (imagen oficial). La app conecta con un
        único rol vía DATABASE_URL (schema.prisma:13 fija url=env("DATABASE_URL");
        client.ts es un único PrismaClient sin selección de URL). Por tanto forTenant Y
        asPlatformAdmin conectan como superusuario y RLS se salta entero. El bypass de
        plataforma es CORRECTO y se mantiene: es por GUC (app.bypass_rls en rls.ts:29-32 y
        políticas que leen current_setting), NO por privilegio de rol. En H1 (local) pasaban
        porque el rol local NO era superusuario. NO es regresión: estos tests nunca corrieron
        en CI. El gate de INC-1 hizo su trabajo: destapar que el aislamiento se saltaba.
      por_que_importa: >-
        Invariante #1 del producto (un tenant nunca ve datos de otro) NO se enforce-a si la
        app conecta como superusuario. Riesgo de seguridad latente DE CARA A PRODUCCIÓN, no
        solo de CI (datos de salud, art. 9 RGPD).
      decision: >-
        Rol de aplicación NO-propietario NOSUPERUSER NOBYPASSRLS con GRANTs de solo CRUD,
        distinto del rol owner (que aplica migraciones/seed). Dos cadenas: DATABASE_URL
        (owner, migraciones/seed) + APP_DATABASE_URL (rol app vetlla_app, runtime y tests
        RLS). Bypass de plataforma sigue por GUC. SQL del rol vive en script de bootstrap
        (packages/db/prisma/sql/app-role.sql), NO en migración Prisma (los roles son infra,
        y OVHcloud gestionado puede no conceder CREATEROLE). Documentado en ADR-0014;
        ADR-0002 enmendado.
      adr: docs/adr/0014-rol-app-no-propietario-rls.md
      handoff:
        nuria-backend: >-
          Crear packages/db/prisma/sql/app-role.sql (SQL idempotente del ADR-0014: DO-block
          CREATE/ALTER ROLE vetlla_app + ALTER ROLE NOSUPERUSER NOBYPASSRLS NOCREATEDB
          NOCREATEROLE + GRANT USAGE schema + GRANT CRUD ON ALL TABLES + GRANT USAGE,SELECT
          ON ALL SEQUENCES + ALTER DEFAULT PRIVILEGES para tablas/secuencias futuras).
          Wiring: client.ts instancia PrismaClient con
          datasourceUrl: process.env.APP_DATABASE_URL ?? process.env.DATABASE_URL (fallback
          = degradación, no rotura). schema.prisma deja la datasource en env("DATABASE_URL")
          (migrate/generate siguen como owner). Verificar que forTenant y asPlatformAdmin
          siguen funcionando (bypass por GUC, no por privilegio). Documentar APP_DATABASE_URL
          en .env.example. Ficheros: packages/db/prisma/sql/app-role.sql (nuevo),
          packages/db/src/client.ts, .env.example.
        leo-devops: >-
          En ci.yml: tras 'Apply migrations' (como owner/DATABASE_URL), añadir step que
          ejecuta app-role.sql contra el Postgres de servicio inyectando la contraseña por
          -v (psql -v app_password=...), y exportar APP_DATABASE_URL=postgresql://vetlla_app:
          <pwd>@localhost:5432/vetlla?schema=public para el step del gate RLS y tests. En
          docker-compose/.env.example: documentar cómo crear vetlla_app en local (mismo
          script de bootstrap) y la variable APP_DATABASE_URL. Re-aplicar los GRANT ON ALL
          TABLES tras cada migración que cree tablas (idempotente).
        quim-qa: >-
          Verificación: el gate '[INC-1] RLS isolation gate' (rls.test.ts) debe PASAR en CI
          con la app conectando como APP_DATABASE_URL (rol vetlla_app no-superusuario). El
          test meta estático (rls-coverage.test.ts, 56 verde) sigue verde aquí sin BD. INC-1
          NO se cierra hasta que el gate dinámico esté verde en CI con el rol de app.
    escalado_a_angel:
      - "Q-003: política de retención/supresión RGPD (condiciona INC-2 / DSAR)."
      - "Q-004: credenciales OVHcloud + DPA (desbloquea INC-3 deploy UE e INC-4 copiloto/H5)."
      - "Q-005: provisión del rol de app vetlla_app en OVHcloud Postgres gestionado (ver open_question)."
    resultado_final: >-
      CERRADO 2026-06-11. CI run #56 (commit 40fb4f0) SUCCESS: gate RLS dinámico (paso #13)
      VERDE con rol vetlla_app NOSUPERUSER NOBYPASSRLS, app-role.sql ejecutado correctamente
      (paso #9), lint+build+typecheck+tests verdes. El invariante de aislamiento multitenant
      (#1) queda protegido en CI. Checkpoint validado — se puede avanzar a INC-2 y resto de
      sprints. Ver plan de sprints pendientes en el chat (2026-06-11).

