# Gap analysis SuperApp Residente/Familia (2026-06-12, Pau)
# --------------------------------------------------------------------------
superapp_gap_analysis:
  date: 2026-06-12
  author: pau-product
  input_doc: >-
    Requerimientos "Evolución de ResiPlus hacia una SuperApp de residente y familia" v0.1
    (entregado por Angel 2026-06-12). Redactado para ResiPlus (capa sobre core legacy)
    pero la visión se absorbe nativamente por Vetlla (Vetlla ES el core cloud-native).
  output_doc: docs/producto/2026-06-12-superapp-residente-familia-gap.md
  reencuadre_estrategico: >-
    Vetlla puede ofrecer la SuperApp familia SIN capa de integración porque los datos
    maestros (residentes, consentimientos, atención, medicación, PIA) ya viven en el mismo
    Postgres con RLS. ResiPlus necesita construir una integración y mantener dos sistemas
    consistentes; Vetlla construye módulos nativos. Este es el diferencial arquitectónico
    real frente al líder del mercado, más duradero que "cloud" (que se puede comprar) o
    "UX" (que se puede copiar). Riesgo: la SuperApp amplía el alcance de gestión a canal
    digital familia, lo que es 5-8 módulos nuevos. No intentar todo a la vez.
  quick_wins:
    - "QW-1: Historia de vida legible en portal familiar (LifeStory ya existe en schema)"
    - "QW-2: Consentimientos accionables desde portal (ConsentRecord ya existe; exponer al familiar + captura IP)"
    - "QW-3: Email de notificación operativa reutilizando provider UE de AUTH-1"
  epicas_must_have:
    - "EPIC-1: Solicitudes/Incidencias del familiar con estado y SLA (mayor impacto reducción carga administrativa)"
    - "EPIC-2: Centro Documental con acuse de lectura (bloqueado en binarios por Q-004/storage; modelo construible ya)"
    - "EPIC-3: Comunicaciones/Anuncios + Web Push VAPID (infraestructura de atención del usuario para el resto)"
    - "EPIC-4: Visitas digitales con QR (alto valor percibido, sin dependencias externas)"
  orden_primer_incremento: >-
    A (Quick Wins: 2-3 días) -> B (EPIC-3 Comunicaciones+Push: 1 semana) ->
    C (EPIC-1 Solicitudes básico: 1.5 semanas) -> D (EPIC-2 Documental metadatos, binarios
    cuando llega Q-004: 1 semana) -> E (EPIC-4 Visitas: 1.5 semanas).
    Total sin dependencias externas: ~6 semanas. Todo sin código nativo, sin pasarela,
    sin storage (salvo EPIC-2 binarios).
  decisiones_para_angel: [Q-006, Q-007, Q-008, Q-009]
  bloqueados_por_angel:
    - "Módulo Pagos completo (Q-007: pasarela)"
    - "Centro Documental binarios (Q-004: object storage OVHcloud)"
    - "Firma electrónica (Q-008: proveedor y nivel)"
    - "App nativa en tiendas (Q-006: PWA vs. nativa)"
    - "Multicentro corporativo (Q-009: modelo de datos)"
  modulos_roadmap_no_ahora:
    - "Reservas de espacios/actividades"
    - "Encuestas/NPS"
    - "Analítica BI"
    - "IoT/accesos"
    - "Marketplace"
    - "SSO corporativo"
    - "SMS"
    - "Videollamadas"
    - "White-label avanzado"

# --------------------------------------------------------------------------
# Preguntas abiertas (decisiones pendientes de Angel)
