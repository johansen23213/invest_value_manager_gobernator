# project_state.yaml — Única fuente de verdad del avance de Vetlla
# Se actualiza al cerrar cada hito (tests verdes + checkpoint + resumen).

project:
  name: Vetlla
  description: SaaS cloud-native de gestión sociosanitaria (residencias, centros de día, viviendas tuteladas) con copiloto de IA agéntica.
  phase: building            # planning | building | done
  current_milestone: H5      # en construcción (reactivado 2026-06-09, ADR-0010); resto del MVP completo
  last_updated: 2026-06-13
  # 2026-06-11 (GC-2 · ejecución en bloque "producto vendible"): tras cerrar INC-1 se
  # ejecutaron consecutivamente TODOS los sprints no bloqueados por Angel, verificados
  # contra Postgres 16 LOCAL con RLS real (rol vetlla_app NOSUPERUSER NOBYPASSRLS creado
  # en este entorno) además del CI:
  #   - INC-5 MAR offline (ADR-0012 -> Aceptada): mergeAdministration/applyMedicationAdminPush
  #     (LWW por EVENTO), tabla medication_sync_conflicts con RLS, medications.push, cola
  #     medOutbox (IndexedDB v2), badge PENDIENTE_SYNC en el MAR. 7 tests puros + 4 integración.
  #   - INC-7 Treatment (M-09) + editor momentDoses (M-11): tabla treatments con RLS + test
  #     aislamiento, router treatments, prescribe con treatmentId, editor de dosis por hora,
  #     sección Tratamientos en el MAR, chip diagnóstico clickable (M-10).
  #   - INC-2 DSAR (mecánica): exportResidentData (art.15, SHA-256 integridad) +
  #     anonymizeResident (art.17, política PARAMETRIZABLE — la decisión es Q-003; default
  #     conservador), permiso dsar:manage, pestaña RGPD en expediente. 4 tests integración.
  #   - VENTA (ADR-0015): onboarding self-service /registro (tenant TRIAL 30d + Dirección +
  #     centro en transacción, AuditLog SIGNUP) + pricing por plaza (Tenant.plan + catálogo
  #     en código, página /plan, banner trial). VERIFICADO en runtime real: registro ->
  #     login del director nuevo OK.
  #   - INC-6 observabilidad (capa app): logger JSON sin PII (redactFields, 5 tests),
  #     onError tRPC sin input, timing de procedures lentas, /api/health con check BD.
  #   - INC-8 UX/i18n: /centros completa es/ca + validación inline Zod (UX-09 restante),
  #     títulos i18n de /residentes y /ocupacion, nav.audit.
  # Totales: 98 tests db + 157 tests web; lint+typecheck+build verdes en cada sprint.
  # Pendiente bloqueado por Angel: INC-3 deploy UE (Q-004), INC-4 copiloto real (Q-004),
  # política de retención definitiva (Q-003). H5 re-validación con Ollama: en vuestra máquina.
  # 2026-06-11 (CIO · cierre INC-1): run #56 (commit 40fb4f0) completado con SUCCESS. El gate
  # RLS dinámico (rls.test.ts, paso #13) VERDE con el rol vetlla_app NOSUPERUSER NOBYPASSRLS.
  # INC-1 CERRADO. Invariante #1 (aislamiento multitenant) protegido en CI. Siguiente: el plan
  # de sprints pendientes (INC-2 a INC-8 + H5 re-validar) está documentado abajo.
  # 2026-06-11 (CIO · gobierno INC-1): el gate RLS corrió por 1ª vez en CI (run #53, f4f7905)
  # y FALLÓ — la app conectaba como rol SUPERUSUARIO y Postgres ignora RLS para superusers
  # (FORCE solo somete al owner). Riesgo de seguridad de cara a producción, no solo de CI.
  # DECISIÓN: rol de app no-propietario NOSUPERUSER NOBYPASSRLS (vetlla_app) + doble URL
  # (DATABASE_URL owner / APP_DATABASE_URL runtime). ADR-0014 (ADR-0002 enmendado). INC-1
  # REABIERTO -> FIX_ROL_APP_EN_CURSO. Handoff a nuria-backend/leo-devops/quim-qa. Nueva
  # open_question Q-005 (provisión del rol en OVHcloud gestionado). Ver decision_incremento_1.
  # 2026-06-10 (CIO · ciclo de gobierno #1): arranque de la iteración MVP->producción.
  # Entregado el roadmap de brechas en docs/roadmap-produccion.md (gap analysis por áreas:
  # seguridad/RGPD, fiabilidad/CI/deploy UE, copiloto/IA, datos/migraciones, UX/a11y,
  # observabilidad, multicentro) + secuencia de 8 épicas con responsable y criterios.
  # DECISIÓN: incremento #1 = INC-1 "Blindar el aislamiento RLS en CI" (owner quim-qa +
  # leo-devops): protege el invariante #1 (multitenant/RLS), es verificable aquí (CI ya
  # levanta Postgres de servicio), reversible y desbloquea las épicas que tocan schema.
  # Nuevas open_questions para Angel: Q-003 (política de retención RGPD/DSAR) y Q-004
  # (credenciales OVHcloud + firma de DPA para cerrar deploy UE e IA). Ver ciclo abajo.
  # 2026-06-10: (1) copiloto: arreglo de prompts v2 (contrato JSON explícito para modelos
  # reales) tras fallar la validación con Ollama; queda pendiente de re-validar es/ca.
  # (2) Sprint Dirección: UX-19 (plano de ocupación + KPIs, /ocupacion) y UX-18 (centro de
  # alertas priorizado, /alertas). Router overview (occupancy/alerts), lógica pura
  # occupancy.ts + alerts.ts con tests. 137 tests web · typecheck/lint/build verde.
  # 2026-06-09: refinamiento UX-first de Medicación y RBAC a partir del análisis
  # competitivo de ResiPlus. Diseño priorizado (docs/ux/medicacion-y-rbac.md) +
  # ADR-0009 (modelo de pauta de medicación). Implementado y verificado (79 tests,
  # build OK): quick wins (alergias visibles, estados accesibles, cabecera sticky,
  # tarjetas de rol PUEDE/NO-PUEDE, auditoría de cambio de rol) y Sprint M
  # (prescripción separada del MAR, vía/forma como enum, pauta por días, PRN,
  # alergia bloqueante con AuditLog OVERRIDE_ALLERGY, /equipo con jobTitle). Tooling:
  # `pnpm run bootstrap` (arranque local de un comando, sin depender de Docker).
  # 2026-06-08: análisis de modelo de negocio (5 informes en docs/negocio/) con
  # investigación de mercado propia. Surface una tensión estratégica: el diferencial
  # declarado (IA Copilot) está en H5 diferido -> decisión pendiente (ver Q-001).
  # 2026-06-07: cerrada deuda de UX en estado "doing": UX-10 (paginación de
  # listados) y UX-17 (MAR por turno + motivo en no-administrado). 54 tests verde.
  # 2026-06-07: UX-08 design system accesible sobre Radix (Dialog/Tabs/Toast en
  # @vetlla/ui); confirm y toast reimplementados sobre las primitivas (focus-trap,
  # scroll-lock, retorno de foco, aria-live gestionada). Tabs queda lista para UX-12.

# --------------------------------------------------------------------------
# Decisiones tomadas (las no triviales también van a docs/adr/)
# --------------------------------------------------------------------------
decisions:
  - id: D-001
    date: 2026-06-06
    decision: >-
      Esta branch (claude/vetlla-saas-mvp-spec-PuHOW) se dedica exclusivamente a
      Vetlla. Se reemplaza el CLAUDE.md previo (sistema Gobernator de inversiones),
      que permanece en la branch main.
  - id: D-002
    date: 2026-06-06
    decision: >-
      Stack confirmado del spec: monorepo pnpm+Turborepo, Next.js App Router + TS,
      tRPC, Prisma + Postgres con RLS, Auth.js, PWA offline (IndexedDB + cola sync),
      Tailwind + shadcn/ui, Zod, Vitest + Playwright, @anthropic-ai/sdk. Todo en UE.
  - id: D-003
    date: 2026-06-08
    decision: >-
      Se documenta el modelo de negocio de Vetlla en docs/negocio/ (5 informes +
      metodología y un dossier ejecutivo), adaptando un framework de análisis de
      empresas cotizadas al caso de una startup pre-ingresos. Fuente de verdad del
      análisis: evidencia de sector/competidores/cliente/regulación; el spec es
      hipótesis, no hecho. Sustenta investigación web de junio 2026 con fuentes
      citadas y datos etiquetados (Confirmado/Estimado/Hipótesis/No confirmado).

# --------------------------------------------------------------------------
# Supuestos pendientes de confirmar (ver chat de planificación)
# --------------------------------------------------------------------------
assumptions:
  - id: A-001
    text: Auth.js (NextAuth) con adaptador Postgres en lugar de Supabase Auth, para mantener el control del schema y RLS en un solo Postgres.
    status: pending_confirmation
  - id: A-002
    text: Transcripción de voz se deja como interfaz/stub en el MVP (entrada por texto operativa); motor UE/on-prem se integra cuando se elija proveedor.
    status: pending_confirmation
  - id: A-003
    text: Despliegue concreto (proveedor app + Postgres EU) se decide en H0/ADR; el MVP corre en local con docker-compose para Postgres.
    status: resolved
    resolution_2026-06-09: >-
      DECIDIDO: OVHcloud (HDS desde 2015 + SecNumCloud) para app + Postgres gestionado +
      inferencia (AI Endpoints open-weight). Scaleway, también HDS, queda como alternativa
      equivalente (cambio = AI_VLLM_BASE_URL). Ver ADR-0011. Pendiente: credenciales +
      benchmark es/ca; verificar ENS para sector público español. (En local sigue docker-compose.)
  - id: A-004
    text: 2FA opcional se modela en datos pero su implementación completa puede caer en H1 o roadmap según esfuerzo.
    status: pending_confirmation

# --------------------------------------------------------------------------
# Análisis de modelo de negocio (docs/negocio/)
# --------------------------------------------------------------------------
business_analysis:
  date: 2026-06-08
  location: docs/negocio/
  method: >-
    Framework de análisis de empresas cotizadas adaptado a startup pre-ingresos.
    Investigación web propia en 4 líneas (estructura del sector, financiación/
    regulación/personal, competidores/pricing, benchmarks SaaS) + dossier ejecutivo.
  documents:
    - docs/negocio/00-metodologia.md
    - docs/negocio/01-sector-map.md
    - docs/negocio/02-business-model.md
    - docs/negocio/03-economics-engine.md
    - docs/negocio/04-strategy-map.md
    - docs/negocio/05-contradiction-check.md
    - docs/negocio/06-dossier-ejecutivo.md
  key_findings:
    - "Hueco real: el líder (ResiPlus, +2.750 centros) sigue siendo escritorio cliente-servidor, no cloud-native."
    - "Diferencial de IA libre: ningún competidor de gestión tiene copiloto agéntico administrativo (la IA del sector es visión/sensores para caídas)."
    - "Dolor del cliente confirmado: escasez de personal + carga documental/inspección + UNE 158101 obligatoria (Madrid nov-2026)."
    - "Único precio público del mercado: GdR = 59 EUR/centro + 2 EUR/residente/mes. ResiPlus/Resilife/Resiges no publican precio."
    - "Mercado fragmentado: ~78% de las camas fuera del top-15 -> beachhead natural en centros pequeños/independientes y nuevos."
    - "Economía atractiva pero CONDICIONAL: el LTV:CAC depende de pricing y churn reales aún sin validar."
  tension: >-
    Palabras vs. actos: el diferencial declarado (IA Copilot) está en H5 diferido.
    A corto, Vetlla compite solo por arquitectura+UX, terreno más fácil de igualar.

