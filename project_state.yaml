        Agents/server-tools -> usar tool use con bucle manual (encaja con human-in-the-loop).
        El desempate Bedrock vs Vertex sigue a A-003 (dónde vivan app+Postgres). AI Act:
        mantener "asistencia administrativa con humano en el bucle" (riesgo limitado +
